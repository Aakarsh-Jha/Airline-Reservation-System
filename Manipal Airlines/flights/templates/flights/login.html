{% extends 'flights/base.html' %}

{% block title %}Login — Manipal Airlines{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your Manipal Airlines account</p>

        <form method="POST" class="auth-form" id="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Enter your username" id="login-username" required autofocus>
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Enter your password" id="login-password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="login-btn" style="margin-top: 0.5rem;">
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Create one →</a>
        </div>
    </div>
</div>
{% endblock %}
